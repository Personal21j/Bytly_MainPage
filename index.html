<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bytly</title>
  <meta name="description" content="Bytly — coming soon. Get in touch for support." />
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f4f5f7;
      --muted: #9aa2af;
      --accent: #ff7a45;
      --border: #262b35;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --text: #1a1d23;
        --muted: #5c6470;
        --accent: #f0592b;
        --border: #e6e8ec;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--accent);
      font-size: 38px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    p.tagline {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 32px;
    }
    .support {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      font-size: 0.95rem;
      color: var(--muted);
    }
    .support a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .support a:hover { text-decoration: underline; }
    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🍽️</div>
    <h1>Bytly</h1>
    <p class="tagline">Something tasty is on the way. This is a placeholder page — the real thing is coming soon.</p>
    <div class="support">
      Need help or have a question?<br />
      Email us at <a href="mailto:bytly.team@gmail.com">bytly.team@gmail.com</a>
    </div>
    <footer>&copy; 2026 Bytly. All rights reserved.</footer>
  </main>
</body>
</html>
